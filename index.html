<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Game Database — coming soon · GDB.GG" />
    <title>Game Database · Coming soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/global.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page-home-landing">
    <div id="global-nav"></div>

    <div class="stage">
      <div class="mesh" aria-hidden="true"></div>
      <div class="grid-drift" aria-hidden="true"></div>

      <div class="orbs" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
      </div>

      <canvas id="sparkles" class="sparkles" aria-hidden="true"></canvas>

      <div class="orbit" aria-hidden="true">
        <div class="orbit-ring">
          <span class="orbit-dot"></span>
          <span class="orbit-dot"></span>
          <span class="orbit-dot"></span>
        </div>
      </div>

      <main class="core">
        <div class="glass-panel">
          <h1 class="brand">
            <span class="brand-line">Game</span>
            <span class="brand-line accent">Database</span>
          </h1>
          <p class="brand-tag">Coming soon</p>
          <div class="load-row" role="status" aria-live="polite" aria-label="Loading">
            <span class="loader-ring" aria-hidden="true"></span>
            <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
          </div>
        </div>
      </main>
    </div>

    <footer class="home-footer">
      <div class="home-footer-inner">
        <div class="home-footer-brand">
          <span class="home-footer-logo">GDB</span><span class="home-footer-dot">.</span><span class="home-footer-gg">GG</span>
        </div>
        <div class="home-footer-links">
          <a href="/marathon/">Marathon</a>
          <a href="/hub.html">Explore</a>
          <a href="/pages/about/">About</a>
          <a href="/pages/contact/">Contact</a>
          <a href="/pages/privacy-policy/">Privacy Policy</a>
          <a href="/pages/terms-and-conditions/">Terms</a>
        </div>
        <p class="home-footer-copy">&copy; 2026 Game Database · GDB.GG</p>
      </div>
    </footer>

    <script src="assets/global.js" defer></script>
    <script src="script.js" defer></script>
  </body>
