<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="gdb.gg — loading" />
    <title>gdb.gg</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="stage">
      <div class="mesh" aria-hidden="true"></div>
      <div class="grid-drift" aria-hidden="true"></div>

      <div class="orbs" aria-hidden="true">
        <span class="orb orb-1"></span>
        <span class="orb orb-2"></span>
        <span class="orb orb-3"></span>
      </div>

      <canvas id="sparkles" class="sparkles" aria-hidden="true"></canvas>

      <div class="orbit" aria-hidden="true">
        <div class="orbit-ring">
          <span class="orbit-dot"></span>
          <span class="orbit-dot"></span>
          <span class="orbit-dot"></span>
        </div>
      </div>

      <main class="core">
        <div class="glass-panel">
          <h1 class="brand">
            gdb<span class="brand-dot">.</span>gg
          </h1>
          <div class="load-row" role="status" aria-live="polite" aria-label="Loading">
            <span class="loader-ring" aria-hidden="true"></span>
            <span class="dots" aria-hidden="true"><i></i><i></i><i></i></span>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
