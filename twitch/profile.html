<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Creator Profile & Stats | gdb.gg</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="/twitch/css/twitch-nav.css"><!-- Theme Color -->
    <meta name="theme-color" content="#9146ff">
    <meta name="msapplication-TileColor" content="#9146ff">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #13131a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b00ff;
            --neon-green: #00ff9f;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes border-glow {
            0%, 100% { 
                border-color: var(--neon-cyan);
                box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0, 243, 255, 0.1);
            }
            25% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink), inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
            50% { 
                border-color: var(--neon-purple);
                box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(139, 0, 255, 0.1);
            }
            75% { 
                border-color: var(--neon-green);
                box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0, 255, 159, 0.1);
            }
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-cyan); }
            50% { opacity: 0.7; text-shadow: 0 0 20px var(--neon-cyan); }
        }

        @keyframes live-border-flash {
            0%, 100% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 30px var(--neon-pink);
            }
            50% { 
                border-color: #ff0055;
                box-shadow: 0 0 50px var(--neon-pink);
            }
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid background with perspective */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* CRT scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 243, 255, 0.03) 51%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 500; /* Reduced from 9999 to stay below master nav (z-index: 1000) */
            animation: scanline 6s linear infinite;
        }

        /* Alert Banner */
        .alert-banner {
            background: rgba(139, 0, 255, 0.2);
            border-bottom: 2px solid var(--neon-purple);
            padding: 0.75rem;
            position: relative;
            z-index: 90;
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
            margin: 0;
            margin-top: 4rem;
        }

        .banner-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .banner-container span {
            color: var(--neon-purple);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .banner-dismiss {
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .banner-dismiss:hover {
            background: var(--neon-purple);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* Navbar */
        .homepage-navbar {
            background: rgba(19, 19, 26, 0.95);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 3px;
            transition: transform 0.3s ease;
        }

        .logo-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logo-domain {
            color: var(--text-primary);
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-pink);
            transition: width 0.3s ease;
        }

        .navbar-link:hover {
            color: var(--neon-pink);
        }

        .navbar-link:hover::after {
            width: 100%;
        }

        .navbar-link-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        /* Accent button for Submit Feedback (pink theme) */
        .navbar-link-accent {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.4rem 1rem;
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-accent:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--neon-cyan);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        /* Profile Header */
        .profile-header-enhanced {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 2rem;
            margin-bottom: 3rem;
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 2rem;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.3);
            align-items: start;
        }

        .profile-avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .profile-avatar-xl {
            width: 150px;
            height: 150px;
            border: 3px solid var(--neon-cyan);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .profile-avatar-xl.live {
            border-color: var(--neon-pink);
            animation: live-border-flash 2s ease-in-out infinite;
        }

        .avatar-live-tag {
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .profile-header-info h1 {
            font-size: 2.5rem;
            color: var(--neon-pink);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        .username-handle {
            display: none;
        }

        .profile-badges {
            display: none;
        }

        .badge-live, .badge-offline {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .badge-live {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .badge-offline {
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text-secondary);
        }

        .live-now-inline {
            margin: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .live-pill {
            color: var(--neon-pink);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .live-meta {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .live-title {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .profile-quick-stats {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
        }

        .quick-stat {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tracking-status {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: flex-end;
        }

        .btn-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            display: inline-block;
        }

        .btn-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .tracking-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        .tracking-indicator.fresh {
            background: rgba(0, 255, 159, 0.1);
            border: 1px solid var(--neon-green);
        }

        .tracking-indicator.stale {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--neon-pink);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .tracking-indicator.fresh .status-dot {
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
        }

        .tracking-indicator.stale .status-dot {
            background: var(--neon-pink);
            box-shadow: 0 0 10px var(--neon-pink);
        }

        .status-label {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .tracking-indicator.fresh .status-label {
            color: var(--neon-green);
        }

        .tracking-indicator.stale .status-label {
            color: var(--neon-pink);
        }

        .tracking-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Tabs */
        .tabs-nav {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .tab-btn.active,
        .tab-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .tabs-content {
            position: relative;
        }

        .card-enhanced {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 2rem;
            margin-bottom: 2rem;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.2);
        }

        .card-enhanced h3 {
            color: var(--neon-pink);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .stat-box {
            background: rgba(10, 10, 15, 0.6);
            border: 2px solid var(--neon-cyan);
            padding: 1.5rem;
            text-align: center;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .stat-box-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .stat-box-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-cyan);
            word-break: break-all;
            overflow-wrap: anywhere;
        }

        .stat-box-value.large-number {
            font-size: 1.5rem;
        }

        .stat-box-value.xlarge-number {
            font-size: 1.2rem;
        }

        .stat-box-delta {
            font-size: 0.85rem;
            margin-top: 0.25rem;
            font-weight: 700;
        }

        .stat-box-delta.positive {
            color: var(--neon-green);
        }

        .stat-box-delta.negative {
            color: var(--neon-pink);
        }

        .toggle-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
        }

        .toggle-btn.active,
        .toggle-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .tab-footer {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .teams-preview {
            display: none;
        }

        .charts-section {
            margin-top: 2rem;
        }

        .charts-section.hidden {
            display: none;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }

        .chart-container {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 1.5rem;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.2);
        }

        .chart-container h4 {
            color: var(--neon-cyan);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* Cards */
        .card-enhanced {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 2rem;
            margin-bottom: 2rem;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.2);
        }

        .card-enhanced h3 {
            font-size: 1.5rem;
            color: var(--neon-pink);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        .toggle-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
            font-size: 0.8rem;
        }

        .toggle-btn.active,
        .toggle-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Grids */
        .clips-grid, .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .clip-card, .video-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-green);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex;
            flex-direction: column;
        }

        .clip-card:hover, .video-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.5);
            transform: translateY(-4px);
        }

        .clip-thumbnail, .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .clip-info, .video-info {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            flex: 1;
        }

        .clip-info h4, .video-info h4 {
            color: var(--neon-cyan);
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            font-weight: 900;
            letter-spacing: 0.5px;
        }

        .clip-stats, .video-stats {
            display: flex;
            gap: 1rem;
            margin: 0.5rem 0;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .clip-rank {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--neon-pink);
            color: var(--bg-dark);
            padding: 0.5rem;
            font-weight: 900;
            font-size: 0.9rem;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }

        /* Empty state */
        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 3rem;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        .loading-text {
            color: var(--neon-cyan);
            text-align: center;
            padding: 2rem;
            letter-spacing: 1px;
        }

        .tab-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 1rem;
            letter-spacing: 0.5px;
        }

        /* Emotes Grid */
        .emotes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .emote-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-purple);
            padding: 1rem;
            text-align: center;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .emote-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            transform: translateY(-4px);
        }

        .emote-image {
            width: 56px;
            height: 56px;
            object-fit: contain;
        }

        .emote-name {
            color: var(--neon-cyan);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            word-break: break-word;
            text-transform: uppercase;
        }

        /* Buttons */
        .btn-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 1rem 2rem;
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        /* Teams */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }

        .team-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-purple);
            padding: 1rem;
            text-align: center;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease;
        }

        .team-card:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.3);
            transform: translateY(-4px);
        }

        .team-card img {
            width: 100%;
            max-height: 120px;
            object-fit: contain;
            margin-bottom: 0.5rem;
        }

        /* Teams (detailed) */
        .teams-detailed {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }
        .team-detailed-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-purple);
            padding: 1rem;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }
        .team-detailed-card .team-banner {
            width: 100%;
            max-height: 160px;
            object-fit: cover;
            margin-bottom: 0.75rem;
            display: block;
            border: 1px solid var(--neon-cyan);
        }
        .team-detailed-card .team-content {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .team-detailed-card .team-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            border: 1px solid var(--neon-cyan);
            flex-shrink: 0;
            background: rgba(0,0,0,0.4);
        }

        .team-card h4 {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 900;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .profile-header-enhanced {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 1.5rem;
            }

            .profile-avatar-container {
                margin: 0 auto;
            }

            .profile-header-info {
                text-align: center;
            }

            .profile-quick-stats {
                justify-content: center;
            }

            .tracking-status {
                align-items: center;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
                gap: 1rem;
            }

            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .clips-grid, .videos-grid {
                grid-template-columns: 1fr;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 2rem 1rem;
            }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
