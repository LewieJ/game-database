<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Category Stats & Analytics | gdb.gg</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="/twitch/css/twitch-nav.css"><!-- Theme Color -->
    <meta name="theme-color" content="#9146ff">
    <meta name="msapplication-TileColor" content="#9146ff">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #13131a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b00ff;
            --neon-green: #00ff9f;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes border-glow {
            0%, 100% { 
                border-color: var(--neon-cyan);
                box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0, 243, 255, 0.1);
            }
            25% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink), inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
            50% { 
                border-color: var(--neon-purple);
                box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(139, 0, 255, 0.1);
            }
            75% { 
                border-color: var(--neon-green);
                box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0, 255, 159, 0.1);
            }
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-cyan); }
            50% { opacity: 0.7; text-shadow: 0 0 20px var(--neon-cyan); }
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid background with perspective */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* CRT scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 243, 255, 0.03) 51%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 500; /* Reduced from 9999 to stay below master nav (z-index: 1000) */
            animation: scanline 6s linear infinite;
        }

        /* Alert Banner */
        .alert-banner {
            background: rgba(139, 0, 255, 0.2);
            border-bottom: 2px solid var(--neon-purple);
            padding: 0.75rem;
            position: relative;
            z-index: 90;
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
            margin: 0;
            margin-top: 4rem;
        }

        .banner-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .banner-container span {
            color: var(--neon-purple);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .banner-dismiss {
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .banner-dismiss:hover {
            background: var(--neon-purple);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* Navbar */
        .homepage-navbar {
            background: rgba(19, 19, 26, 0.95);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 3px;
            transition: transform 0.3s ease;
        }

        .logo-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logo-domain {
            color: var(--text-primary);
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-pink);
            transition: width 0.3s ease;
        }

        .navbar-link:hover {
            color: var(--neon-pink);
        }

        .navbar-link:hover::after {
            width: 100%;
        }

        .navbar-link-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        /* Accent button for Submit Feedback (pink theme) */
        .navbar-link-accent {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.4rem 1rem;
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-accent:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--neon-cyan);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        /* Category Header */
        .category-header {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 2rem;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.3);
        }

        .category-box-art {
            width: 200px;
            height: auto;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .category-info h2 {
            font-size: 2.5rem;
            color: var(--neon-pink);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        .category-rank {
            color: var(--neon-green);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .category-stats {
            display: flex;
            gap: 3rem;
            margin-top: 1.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Charts Section */
        .charts-section {
            margin: 3rem 0;
        }

        .charts-section h3 {
            font-size: 1.8rem;
            color: var(--neon-pink);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        .toggle-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .toggle-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .toggle-btn.active,
        .toggle-btn:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .chart-container {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 1.5rem;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.2);
        }

        .chart-container h4 {
            color: var(--neon-cyan);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .chart-wrapper {
            position: relative;
            height: 300px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-green);
            padding: 1.5rem;
            clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.5);
            transform: translateY(-4px);
        }

        .stat-card h4 {
            color: var(--neon-cyan);
            font-size: 1rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .stat-card p {
            color: var(--text-primary);
            font-size: 0.9rem;
            margin: 0.5rem 0;
            letter-spacing: 0.5px;
        }

        .stat-card strong {
            color: var(--neon-pink);
            font-weight: 900;
        }

        .positive {
            color: var(--neon-green) !important;
        }

        .negative {
            color: var(--neon-pink) !important;
        }

        /* Empty state */
        .empty-state {
            color: var(--text-secondary);
            text-align: center;
            padding: 3rem;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 1rem 2rem;
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn-primary:hover, .btn-secondary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-secondary:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .category-header {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .category-box-art {
                margin: 0 auto;
            }

            .category-stats {
                justify-content: center;
            }

            .navbar-container {
                flex-direction: column;
                gap: 1rem;
            }

            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="global-nav"></div>
    <script src="/assets/global.js"></script>

    <div id="twitch-sub-nav"></div>
    <script src="/twitch/js/twitch-nav.js"></script>

    <div class="container">

        <main class="category-page">
            <div id="loading" class="loading"></div>
            <div id="category-content" style="display: none;"></div>
        </main>

        <footer>
            <p>&copy; 2025 gdb.gg — Built with <span>♥</span> by a non-dev</p>
        </footer>
    </div>

    <script src="/twitch/js/category.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
</body>
</html>
