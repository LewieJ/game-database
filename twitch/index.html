<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Live Stats & Analytics | gdb.gg</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="/twitch/css/twitch-nav.css"><!-- Theme Color -->
    <meta name="theme-color" content="#9146ff">
    <meta name="msapplication-TileColor" content="#9146ff"><style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #13131a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b00ff;
            --neon-green: #00ff9f;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes border-glow {
            0%, 100% { 
                border-color: var(--neon-cyan);
                box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0, 243, 255, 0.1);
            }
            25% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink), inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
            50% { 
                border-color: var(--neon-purple);
                box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(139, 0, 255, 0.1);
            }
            75% { 
                border-color: var(--neon-green);
                box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0, 255, 159, 0.1);
            }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
            50% { filter: drop-shadow(0 0 20px currentColor); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid background with perspective */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* CRT scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 243, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 500; /* Reduced from 1000 to stay below master nav */
            animation: scanline 6s linear infinite;
        }

        /* Alert Banner */
        .alert-banner {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 2rem;
            position: sticky;
            top: 4rem;
            z-index: 90;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            margin: 0;
        }

        .banner-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .banner-dismiss {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .banner-dismiss:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Navigation */
        .homepage-navbar {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--neon-purple);
            padding: 0.75rem 2rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            position: relative;
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.3s ease;
            letter-spacing: 4px;
        }

        .logo-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logo-domain {
            color: var(--text-primary);
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s ease;
        }

        .navbar-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .navbar-link:hover::after {
            width: 100%;
        }

        .navbar-link-primary {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-primary:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-green);
            transform: translateY(-2px);
        }

        /* Accent button for Submit Feedback (pink theme) */
        .navbar-link-accent {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.4rem 1rem;
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-accent:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Search Section */
        .search-section {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-cyan);
            padding: 1.25rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
            position: relative;
            clip-path: polygon(
                20px 0, 100% 0, 100% calc(100% - 20px), 
                calc(100% - 20px) 100%, 0 100%, 0 20px
            );
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .search-section:hover {
            animation: border-glow 4s linear infinite;
            transform: translateY(-4px);
        }

        .search-section h2 {
            display: none;
        }

        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 0;
        }

        .search-type-select {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-green);
            padding: 0.75rem 1rem;
            color: var(--neon-green);
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .search-type-select:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .search-type-select:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .search-type-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        #creator-search {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid var(--neon-purple);
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        #creator-search::placeholder {
            color: var(--text-secondary);
        }

        #creator-search:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .btn-search {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.75rem 1.5rem;
            color: var(--neon-pink);
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn-search:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Search Results */
        #search-results {
            margin-top: 1rem;
        }

        .search-results-header h4 {
            color: var(--neon-green);
            font-size: 0.9rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .search-result-card {
            background: rgba(19, 19, 26, 0.8);
            border: 2px solid var(--neon-purple);
            padding: 1.5rem;
            display: flex;
            gap: 1rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .search-result-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            transform: translateY(-4px);
        }

        .search-result-avatar {
            position: relative;
            flex-shrink: 0;
        }

        .search-result-avatar img {
            width: 60px;
            height: 60px;
            border-radius: 0;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .live-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: var(--neon-pink);
            color: var(--bg-dark);
            font-size: 0.65rem;
            padding: 0.3rem 0.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 0 10px var(--neon-pink);
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }

        .search-result-info h4 {
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
            font-weight: 900;
            color: var(--neon-cyan);
        }

        .search-result-info p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin: 0.25rem 0;
            letter-spacing: 1px;
        }

        /* Category search result styling */
        .category-result-card .category-avatar img {
            width: 80px;
            height: 107px;
        }

        /* Content Sections */
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-block {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 1.25rem;
            transition: all 0.3s ease;
            position: relative;
            clip-path: polygon(
                20px 0, 100% 0, 100% calc(100% - 20px), 
                calc(100% - 20px) 100%, 0 100%, 0 20px
            );
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.3);
        }

        .section-block:hover {
            animation: border-glow 4s linear infinite;
            transform: translateY(-4px);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }

        .section-block h3 {
            font-size: 1.5rem;
            margin-bottom: 0;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        /* Streams Grid - Horizontal Scrollable */
        .streams-grid-horizontal {
            display: flex;
            gap: 1.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            scroll-behavior: smooth;
        }

        .streams-grid-horizontal::-webkit-scrollbar {
            height: 8px;
        }

        .streams-grid-horizontal::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .streams-grid-horizontal::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 4px;
        }

        .streams-grid-horizontal::-webkit-scrollbar-thumb:hover {
            background: var(--neon-purple);
        }

        .stream-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-cyan);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
        }

        .stream-card:hover {
            border-color: var(--neon-pink);
            box-shadow: 0 0 40px rgba(255, 0, 110, 0.5);
            transform: translateY(-6px);
        }

        .stream-thumbnail {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: var(--bg-dark);
            overflow: hidden;
            flex-shrink: 0;
        }

        .stream-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stream-live-badge {
            display: none;
        }

        .stream-viewers {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.8);
            color: var(--neon-green);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            z-index: 2;
            letter-spacing: 1px;
            border: 1px solid var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 159, 0.3);
        }

        .stream-info {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stream-info h4 {
            font-size: 0.95rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            margin: 0;
        }

        .stream-info p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Stream Card Avatar & Info (for live streams) */
        .stream-card-avatar {
            position: relative;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
        }

        .stream-card-avatar img {
            width: 120px;
            height: 120px;
            border-radius: 0;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .stream-card-info {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .stream-card-name {
            font-size: 1.05rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            margin: 0;
        }

        .stream-card-game {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .stream-card-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--neon-green);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stream-card-stats span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .viewer-count {
            color: var(--neon-pink);
        }

        .live-duration {
            color: var(--neon-purple);
        }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-green);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex;
            flex-direction: column;
        }

        .category-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 40px rgba(139, 0, 255, 0.5);
            transform: translateY(-6px);
        }

        .category-card-image {
            position: relative;
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
        }

        .category-card-image img {
            width: auto;
            height: 220px;
            max-width: 100%;
            object-fit: contain;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .category-card-name {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.6);
            font-size: 1.05rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-card-stats {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .category-card-stats span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .category-viewers {
            color: var(--neon-pink);
        }

        .category-channels {
            color: var(--neon-green);
        }

        /* Most Followed Grid - Compact Square Layout */
        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        /* Live indicator for followed creators */
        .live-indicator {
            background: var(--neon-pink);
            color: var(--bg-dark);
            font-size: 0.7rem;
            padding: 0.3rem 0.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            box-shadow: 0 0 10px var(--neon-pink);
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
            display: inline-block;
        }

        /* Buttons */
        .btn-primary, .btn-secondary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 0.5rem 1.25rem;
            color: var(--neon-cyan);
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .btn-primary:hover, .btn-secondary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
        }

        .btn-secondary:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* Loading & Empty States */
        .loading-text, .empty-state, .error-text {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .error-text {
            color: var(--neon-pink);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
            color: var(--text-secondary);
            border-top: 2px solid var(--neon-cyan);
            letter-spacing: 2px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-links {
                gap: 1rem;
            }

            .navbar-link {
                font-size: 0.75rem;
            }

            .search-bar {
                flex-direction: column;
            }

            .streams-grid-horizontal,
            .categories-grid,
            .creators-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script src="/assets/global.js"></script>

    <div id="twitch-sub-nav"></div>

    <div class="container">

        <main class="twitch-page">
            <section class="search-section">

                        <option value="creators">Creators</option>
                        <option value="categories">Categories</option>
                    </select>
                    <input type="text" id="creator-search" placeholder="SEARCH FOR A CREATOR...">
                    <button id="search-btn" class="btn-search">🔍 Search</button>
                </div>
                <div id="search-results"></div>
            </section>

            <section class="content-section">
                <div class="section-block">
                    <div class="section-header">
                        <h3>Top Live Streams</h3>
                        <div id="streams-show-more"></div>
                    </div>
                    <div id="top-streams"></div>
                </div>

                <div class="section-block">
                    <div class="section-header">
                        <h3>Top Categories</h3>
                        <div id="categories-show-more" style="display: none;">
                            <button id="show-more-btn" class="btn-secondary">Show More</button>
                        </div>
                    </div>
                    <div id="top-categories"></div>
                </div>

                <div class="section-block">
                    <div class="section-header">
                        <h3>Most Followed</h3>
                        <div id="followed-show-more"></div>
                    </div>
                    <div id="most-followed"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2025 gdb.gg — Built with <span>♥</span> by a non-dev</p>
        </footer>
    </div>

    <script src="/twitch/js/twitch.js"></script>
</body>
</html>
