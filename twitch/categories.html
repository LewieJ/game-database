<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="/twitch/css/twitch-nav.css">
    <title>Top 150 Twitch Categories & Games | gdb.gg</title><!-- Theme Color -->
    <meta name="theme-color" content="#9146ff">
    <meta name="msapplication-TileColor" content="#9146ff">>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #13131a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b00ff;
            --neon-green: #00ff9f;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes border-glow {
            0%, 100% { 
                border-color: var(--neon-cyan);
                box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0, 243, 255, 0.1);
            }
            25% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink), inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
            50% { 
                border-color: var(--neon-purple);
                box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(139, 0, 255, 0.1);
            }
            75% { 
                border-color: var(--neon-green);
                box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0, 255, 159, 0.1);
            }
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid background with perspective */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* CRT scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 243, 255, 0.03) 51%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 500; /* Reduced from 9999 to stay below master nav (z-index: 1000) */
            animation: scanline 6s linear infinite;
        }

        /* Alert Banner */
        .alert-banner {
            background: rgba(139, 0, 255, 0.2);
            border-bottom: 2px solid var(--neon-purple);
            padding: 0.75rem;
            position: relative;
            z-index: 90;
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
            margin: 0;
            margin-top: 4rem;
        }

        .banner-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .banner-container span {
            color: var(--neon-purple);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .banner-dismiss {
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
        }

        .banner-dismiss:hover {
            background: var(--neon-purple);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        /* Navbar */
        .homepage-navbar {
            background: rgba(19, 19, 26, 0.95);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }

        .navbar-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: 3px;
            transition: transform 0.3s ease;
        }

        .logo-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logo-domain {
            color: var(--text-primary);
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-pink);
            transition: width 0.3s ease;
        }

        .navbar-link:hover {
            color: var(--neon-pink);
        }

        .navbar-link:hover::after {
            width: 100%;
        }

        .navbar-link-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 0.75rem 1.5rem;
            color: var(--neon-cyan);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        /* Accent button for Submit Feedback (pink theme) */
        .navbar-link-accent {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.4rem 1rem;
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-accent:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Categories Page */
        .categories-page {
            margin-top: 2rem;
        }

        .leaderboards-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .leaderboards-header h2 {
            font-size: 2.5rem;
            color: var(--neon-pink);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 10px var(--neon-pink);
            font-weight: 900;
        }

        .leaderboards-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #loading-spinner {
            text-align: center;
            padding: 4rem 2rem;
        }

        #loading-spinner p {
            color: var(--neon-cyan);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-cyan); }
            50% { opacity: 0.7; text-shadow: 0 0 20px var(--neon-cyan); }
        }

        /* Categories Grid */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid var(--neon-green);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex;
            flex-direction: column;
        }

        .category-card:hover {
            border-color: var(--neon-purple);
            box-shadow: 0 0 40px rgba(139, 0, 255, 0.5);
            transform: translateY(-6px);
        }

        .category-card-image {
            position: relative;
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 240px;
        }

        .category-card-image img {
            width: auto;
            height: 220px;
            max-width: 100%;
            object-fit: contain;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .category-card-name {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.6);
            font-size: 1.05rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-card-stats {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: space-around;
            gap: 1rem;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .category-card-stats span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .category-viewers {
            color: var(--neon-pink);
        }

        .category-channels {
            color: var(--neon-green);
        }

        /* Loading and error states */
        .loading-text {
            color: var(--neon-cyan);
            font-size: 1.1rem;
            text-align: center;
            padding: 3rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .error-text {
            color: var(--neon-pink);
            font-size: 1rem;
            text-align: center;
            padding: 3rem;
            letter-spacing: 1px;
        }

        .empty-state {
            color: var(--text-secondary);
            font-size: 1rem;
            text-align: center;
            padding: 3rem;
            letter-spacing: 1px;
        }

        /* Button */
        .btn-primary {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            padding: 1rem 2rem;
            color: var(--neon-cyan);
            font-size: 0.9rem;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .btn-primary:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-cyan);
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
                gap: 1rem;
            }

            .navbar-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .category-card-image {
                min-height: 180px;
            }

            .category-card-image img {
                height: 160px;
            }

            .leaderboards-header h2 {
                font-size: 2rem;
            }

            .container {
                padding: 2rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="global-nav"></div>
    <script src="/assets/global.js"></script>

    <div id="twitch-sub-nav"></div>
    <script src="/twitch/js/twitch-nav.js"></script>

    <main class="container">
        <div class="categories-page">
            <div class="leaderboards-header">
                <h2>Top Categories</h2>
                <p>Most popular games and categories on Twitch</p>
            </div>
            <div id="loading-spinner" style="text-align: center; padding: 2rem;">
                <p>Loading categories...</p>
            </div>
            <div id="categories-content"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 gdb.gg — Built with <span>♥</span> by a non-dev</p>
    </footer>

    <script src="/twitch/js/categories.js"></script>
</body>
</html>
