<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Leaderboards - Top Streamers & Rankings | gdb.gg</title>
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="/twitch/css/twitch-nav.css"><!-- Theme Color -->
    <meta name="theme-color" content="#9146ff">
    <meta name="msapplication-TileColor" content="#9146ff">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0f;
            --bg-secondary: #13131a;
            --neon-cyan: #00f3ff;
            --neon-pink: #ff006e;
            --neon-purple: #8b00ff;
            --neon-green: #00ff9f;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        @keyframes border-glow {
            0%, 100% { 
                border-color: var(--neon-cyan);
                box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0, 243, 255, 0.1);
            }
            25% { 
                border-color: var(--neon-pink);
                box-shadow: 0 0 20px var(--neon-pink), inset 0 0 20px rgba(255, 0, 110, 0.1);
            }
            50% { 
                border-color: var(--neon-purple);
                box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(139, 0, 255, 0.1);
            }
            75% { 
                border-color: var(--neon-green);
                box-shadow: 0 0 20px var(--neon-green), inset 0 0 20px rgba(0, 255, 159, 0.1);
            }
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 5px currentColor); }
            50% { filter: drop-shadow(0 0 20px currentColor); }
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Grid background with perspective */
        body::before {
            content: '';
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            pointer-events: none;
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* CRT scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 243, 255, 0.03) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 500; /* Reduced from 1000 to stay below master nav */
            animation: scanline 6s linear infinite;
        }

        /* Alert Banner */
        .alert-banner {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--neon-cyan);
            padding: 0.75rem 2rem;
            position: sticky;
            top: 4rem;
            z-index: 90;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            margin: 0;
        }

        .banner-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .banner-dismiss {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .banner-dismiss:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Navigation */
        .homepage-navbar {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--neon-purple);
            padding: 0.75rem 2rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(139, 0, 255, 0.3);
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            transition: all 0.3s ease;
            letter-spacing: 4px;
        }

        .logo-text {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .logo-domain {
            color: var(--text-primary);
        }

        .navbar-logo:hover {
            transform: scale(1.05);
        }

        .navbar-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .navbar-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            padding: 0.5rem 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }

        .navbar-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.3s ease;
        }

        .navbar-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .navbar-link:hover::after {
            width: 100%;
        }

        .navbar-link-primary {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0.6rem 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-primary:hover {
            background: var(--neon-green);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--neon-green);
            transform: translateY(-2px);
        }

        /* Accent button for Submit Feedback (pink theme) */
        .navbar-link-accent {
            background: transparent;
            border: 2px solid var(--neon-pink);
            padding: 0.4rem 1rem;
            color: var(--neon-pink);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 900;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .navbar-link-accent:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Leaderboards specific */
        .leaderboards-page {
            margin-bottom: 4rem;
        }

        .leaderboards-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .leaderboards-header h2 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px var(--neon-cyan);
            margin-bottom: 1rem;
        }

        .leaderboards-header p {
            color: var(--text-secondary);
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Tabs */
        .leaderboard-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .leaderboard-tab {
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 1rem 2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .leaderboard-tab:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .leaderboard-tab.active {
            background: var(--neon-pink);
            border-color: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* Table */
        .leaderboard-content {
            display: none;
        }

        .leaderboard-content.active {
            display: block;
        }

        .leaderboard-table {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 2rem;
            clip-path: polygon(
                20px 0, 100% 0, 100% calc(100% - 20px), 
                calc(100% - 20px) 100%, 0 100%, 0 20px
            );
            box-shadow: 0 0 30px rgba(139, 0, 255, 0.3);
            margin-bottom: 2rem;
        }

        .table-header {
            display: grid;
            grid-template-columns: 80px 1fr 200px 150px 120px;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 2px solid var(--neon-cyan);
            font-weight: 900;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .table-row {
            display: grid;
            grid-template-columns: 80px 1fr 200px 150px 120px;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            align-items: center;
        }

        .table-row:hover {
            background: rgba(0, 243, 255, 0.1);
            border-color: var(--neon-cyan);
            transform: translateX(5px);
        }

        .col-rank {
            text-align: center;
        }

        .rank-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            font-weight: 900;
            letter-spacing: 1px;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }

        .rank-1 {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }

        .rank-2 {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .rank-3 {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        .col-streamer {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .streamer-avatar {
            width: 50px;
            height: 50px;
            border: 2px solid var(--neon-cyan);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .streamer-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .streamer-name {
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
        }

        .stream-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }

        .col-game {
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .viewer-count-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        .col-uptime {
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* Stats Section */
        .stats-row {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-cyan);
            padding: 1.5rem 2rem;
            text-align: center;
            min-width: 200px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 2px;
        }

        /* Load More Button */
        .load-more {
            text-align: center;
            margin-top: 2rem;
        }

        .load-more button {
            background: transparent;
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 1rem 3rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .load-more button:hover {
            background: var(--neon-pink);
            color: var(--bg-dark);
            box-shadow: 0 0 30px var(--neon-pink);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
            color: var(--text-secondary);
            border-top: 2px solid var(--neon-cyan);
            letter-spacing: 2px;
        }

        /* Placeholder */
        .placeholder-content {
            background: rgba(19, 19, 26, 0.9);
            border: 2px solid var(--neon-purple);
            padding: 4rem 2rem;
            text-align: center;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            color: var(--text-secondary);
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .table-header,
            .table-row {
                grid-template-columns: 60px 1fr 120px;
            }

            .col-game,
            .col-uptime {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .navbar-links {
                gap: 1rem;
            }

            .navbar-link {
                font-size: 0.75rem;
            }

            .leaderboard-tabs {
                flex-direction: column;
            }

            .table-header,
            .table-row {
                grid-template-columns: 60px 1fr;
            }

            .col-viewers {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>

    <div id="global-nav"></div>
    <script src="/assets/global.js"></script>

    <div id="twitch-sub-nav"></div>
    <script src="/twitch/js/twitch-nav.js"></script>

    <div class="container">

        <main class="leaderboards-page">
            <h2>Twitch Leaderboards</h2>
            <div class="placeholder-content">
                <p>Leaderboards will appear here</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2025 gdb.gg — Built with <span>♥</span> by a non-dev</p>
            </div>
        </footer>
    </div>

    <script src="/twitch/js/leaderboards.js"></script>
</body>
</html>
