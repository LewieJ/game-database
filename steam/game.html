<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
    <title>Steam Game Details – Player Count & Stats | gdb.gg</title><!-- Theme Color -->
    <meta name="theme-color" content="#1b2838">
    <meta name="msapplication-TileColor" content="#1b2838">
    
    <link rel="stylesheet" href="/assets/global.css">
    <link rel="stylesheet" href="css/steam.css">
    <style>
        /* Game page specific styles */

        /* Skeleton Loading - Game Page Specific */
        .skeleton-header {
            display: grid;
            grid-template-columns: 460px 1fr;
            gap: 2rem;
            padding: 2rem;
            background: rgba(27, 40, 56, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 2rem;
        }

        .skeleton-image {
            width: 460px;
            height: 215px;
        }

        .skeleton-title {
            height: 40px;
            width: 70%;
            margin-bottom: 1rem;
        }

        .skeleton-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .skeleton-section {
            background: rgba(27, 40, 56, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .skeleton-section-title {
            height: 24px;
            width: 150px;
            margin-bottom: 1rem;
        }

        .skeleton-screenshots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
        }

        .skeleton-screenshot {
            aspect-ratio: 16/9;
        }

        /* Age Rating Badge */
        .age-rating {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(201, 76, 76, 0.2);
            border: 1px solid var(--danger);
            border-radius: 4px;
            color: var(--danger);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .age-rating.mature {
            background: rgba(201, 76, 76, 0.2);
            border-color: var(--danger);
            color: var(--danger);
        }

        .age-rating.teen {
            background: rgba(243, 167, 18, 0.2);
            border-color: var(--warning);
            color: var(--warning);
        }

        .age-rating.everyone {
            background: rgba(95, 186, 70, 0.2);
            border-color: var(--success);
            color: var(--success);
        }

        /* Related Games */
        .related-games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .related-game-card {
            background: rgba(27, 40, 56, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .related-game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .related-game-card img {
            width: 100%;
            aspect-ratio: 460/215;
            object-fit: cover;
        }

        .related-game-info {
            padding: 0.75rem;
        }

        .related-game-title {
            font-size: 0.85rem;
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .related-game-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .related-loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        /* Achievements Section */
        .achievements-section {
            margin-top: 2rem;
        }

        .achievements-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .achievements-header h2 {
            margin: 0;
        }

        .achievements-stats {
            display: flex;
            gap: 1.5rem;
        }

        .achievement-stat {
            text-align: center;
        }

        .achievement-stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--steam-blue);
        }

        .achievement-stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .rarity-distribution {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .rarity-bar {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .rarity-bar .fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        .rarity-bar.ultra-rare .fill { background: linear-gradient(90deg, #ff6b6b, #ee5a5a); }
        .rarity-bar.rare .fill { background: linear-gradient(90deg, #ffd93d, #f5c800); }
        .rarity-bar.uncommon .fill { background: linear-gradient(90deg, #66d4f4, #4fc3dc); }
        .rarity-bar.common .fill { background: linear-gradient(90deg, #5fba46, #4a9e36); }

        .rarity-legend {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .rarity-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .rarity-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .rarity-dot.ultra-rare { background: #ff6b6b; }
        .rarity-dot.rare { background: #ffd93d; }
        .rarity-dot.uncommon { background: #66d4f4; }
        .rarity-dot.common { background: #5fba46; }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(102, 192, 244, 0.05);
            border: 1px solid rgba(102, 192, 244, 0.1);
            border-radius: 6px;
        }

        .achievement-icon {
            width: 48px;
            height: 48px;
            border-radius: 4px;
            background: rgba(27, 40, 56, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .achievement-icon img {
            width: 100%;
            height: 100%;
            border-radius: 4px;
            object-fit: cover;
        }

        .achievement-info {
            flex: 1;
            min-width: 0;
        }

        .achievement-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .achievement-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .achievement-percent {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .achievement-percent.ultra-rare { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .achievement-percent.rare { background: rgba(255, 217, 61, 0.2); color: #ffd93d; }
        .achievement-percent.uncommon { background: rgba(102, 212, 244, 0.2); color: #66d4f4; }
        .achievement-percent.common { background: rgba(95, 186, 70, 0.2); color: #5fba46; }

        .achievements-notice {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .achievements-notice a {
            color: var(--steam-blue);
        }

        /* Header */
        .game-header {
            background: rgba(27, 40, 56, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            align-items: start;
        }

        .header-image {
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            max-width: 460px;
            width: 100%;
        }

        .header-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .header-info h1 {
            font-size: 2.5rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .game-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .meta-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(102, 192, 244, 0.1);
            border: 1px solid var(--border-color);
            color: var(--steam-blue);
        }

        .meta-badge.free {
            background: rgba(95, 186, 70, 0.1);
            border-color: rgba(95, 186, 70, 0.3);
            color: var(--success);
        }

        .game-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: rgba(102, 192, 244, 0.05);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid rgba(102, 192, 244, 0.1);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--steam-blue), #66d4f4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            gap: 2rem;
        }

        .section {
            background: rgba(27, 40, 56, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
        }

        .section h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        /* Screenshots */
        .screenshots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .screenshot {
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .screenshot:hover {
            transform: scale(1.02);
        }

        .screenshot img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Info Lists */
        .info-list {
            display: grid;
            gap: 1rem;
        }

        .info-item {
            display: flex;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(102, 192, 244, 0.1);
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-muted);
            width: 150px;
            flex-shrink: 0;
        }

        .info-value {
            color: var(--text-secondary);
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background: rgba(102, 192, 244, 0.1);
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: var(--steam-blue);
            border: 1px solid var(--border-color);
        }

        /* Error State */
        .error-message {
            background: rgba(201, 76, 76, 0.1);
            border: 1px solid rgba(201, 76, 76, 0.3);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
        }

        .error-message h2 {
            color: var(--danger);
            margin-bottom: 1rem;
        }

        .error-message p {
            color: var(--text-secondary);
        }

        /* News Section */
        .news-list {
            display: grid;
            gap: 1rem;
        }

        .news-item {
            background: rgba(102, 192, 244, 0.05);
            border: 1px solid rgba(102, 192, 244, 0.1);
            border-radius: 6px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .news-item:hover {
            border-color: var(--steam-blue);
            background: rgba(102, 192, 244, 0.1);
        }

        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .news-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .news-excerpt {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Price Box */
        .price-box {
            background: rgba(102, 192, 244, 0.05);
            border: 1px solid rgba(102, 192, 244, 0.1);
            border-radius: 6px;
            padding: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .price-discount {
            background: #4c6b22;
            color: #a4d007;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .price-original {
            text-decoration: line-through;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .price-final {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .price-final.free {
            color: var(--success);
        }

        /* Two column layout */
        .content-columns {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1000px) {
            .content-columns {
                grid-template-columns: 1fr;
            }
            .game-header {
                grid-template-columns: 1fr;
            }
        }

        /* DLC Grid */
        .dlc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.75rem;
        }

        .dlc-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(102, 192, 244, 0.05);
            border: 1px solid rgba(102, 192, 244, 0.1);
            border-radius: 6px;
            padding: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dlc-item:hover {
            border-color: var(--steam-blue);
        }

        .dlc-icon {
            width: 120px;
            height: 45px;
            border-radius: 4px;
            object-fit: cover;
        }

        .dlc-name {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-primary);
        }

        /* System Requirements */
        .requirements-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .req-tab {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .req-tab.active {
            background: rgba(102, 192, 244, 0.1);
            border-color: var(--steam-blue);
            color: var(--steam-blue);
        }

        .requirements-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .requirements-content ul {
            list-style: none;
        }

        .requirements-content li {
            padding: 0.25rem 0;
        }

        .requirements-content strong {
            color: var(--text-primary);
        }

        /* Player History Chart */
        .player-chart-section {
            background: rgba(27, 40, 56, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .player-chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .player-chart-header h2 {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin: 0;
        }

        .chart-controls {
            display: flex;
            gap: 8px;
        }

        .chart-range-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid rgba(102, 192, 244, 0.3);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chart-range-btn:hover {
            border-color: rgba(102, 192, 244, 0.5);
            color: var(--text-primary);
        }

        .chart-range-btn.active {
            background: var(--steam-blue);
            border-color: var(--steam-blue);
            color: #fff;
        }

        .player-chart-container {
            position: relative;
            height: 250px;
            background: rgba(23, 26, 33, 0.5);
            border-radius: 6px;
            overflow: hidden;
        }

        .player-chart-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .chart-loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(23, 26, 33, 0.8);
            z-index: 5;
        }

        .chart-loading .loading-spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(102, 192, 244, 0.2);
            border-top-color: var(--steam-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }

        .chart-loading p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .chart-info {
            margin-top: 10px;
            padding: 8px 12px;
            background: rgba(102, 192, 244, 0.1);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Movies/Trailers */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        .movie-item {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .movie-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .movie-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }

        .movie-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .movie-item:hover .movie-overlay {
            opacity: 1;
        }

        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(102, 192, 244, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 20px solid #fff;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            margin-left: 4px;
        }

        .movie-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.75rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            font-size: 0.85rem;
            color: #fff;
        }

        /* Video Modal */
        .video-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .video-modal.visible {
            display: flex;
        }

        .video-modal-content {
            position: relative;
            max-width: 900px;
            width: 90%;
        }

        .video-modal video {
            width: 100%;
            border-radius: 8px;
        }

        .video-modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .video-modal-close:hover {
            opacity: 1;
        }

        .video-title {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        /* About Section */
        .about-section {
            background: rgba(27, 40, 56, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .about-content {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .about-content.collapsed {
            max-height: 200px;
            overflow: hidden;
            position: relative;
        }

        .about-content.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(transparent, rgba(27, 40, 56, 1));
        }

        .about-toggle {
            display: inline-block;
            margin-top: 1rem;
            color: var(--steam-blue);
            cursor: pointer;
            font-size: 0.9rem;
        }

        .about-toggle:hover {
            text-decoration: underline;
        }
    </style>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="global-nav"></div>
    <script src="/assets/global.js"></script>

    <div id="warningBanner" class="warning-banner">
        <div class="warning-content">
            <span class="warning-icon">⚠️</span>
            <span class="warning-text">
                <strong>Early Access:</strong> Steam game pages are in early access. Some data may be unavailable.
            </span>
        </div>
        <button class="dismiss-button" onclick="dismissWarning()">Dismiss</button>
    </div>

    <div class="container">
        <div id="loading" class="loading">
            <!-- Skeleton Header -->
            <div class="skeleton-header">
                <div class="skeleton skeleton-image"></div>
                <div>
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text long"></div>
                    <div class="skeleton skeleton-text medium"></div>
                    <div class="skeleton skeleton-text short"></div>
                </div>
            </div>
            <!-- Skeleton Content -->
            <div class="skeleton-content">
                <div>
                    <div class="skeleton-section">
                        <div class="skeleton skeleton-section-title"></div>
                        <div class="skeleton-screenshots">
                            <div class="skeleton skeleton-screenshot"></div>
                            <div class="skeleton skeleton-screenshot"></div>
                            <div class="skeleton skeleton-screenshot"></div>
                        </div>
                    </div>
                    <div class="skeleton-section">
                        <div class="skeleton skeleton-section-title"></div>
                        <div class="skeleton skeleton-text long"></div>
                        <div class="skeleton skeleton-text long"></div>
                        <div class="skeleton skeleton-text medium"></div>
                    </div>
                </div>
                <div>
                    <div class="skeleton-section">
                        <div class="skeleton skeleton-section-title"></div>
                        <div class="skeleton skeleton-text medium"></div>
                        <div class="skeleton skeleton-text short"></div>
                        <div class="skeleton skeleton-text medium"></div>
                        <div class="skeleton skeleton-text short"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="content" style="display: none;"></div>
    </div>

    <!-- Video Modal -->
    <div class="video-modal" id="videoModal">
        <div class="video-modal-content" onclick="event.stopPropagation()">
            <button class="video-modal-close" onclick="closeVideo()">&times;</button>
            <div class="video-title" id="videoTitle"></div>
            <video id="modalVideo" controls></video>
        </div>
    </div>

    <script>
        async function loadGameDetails() {
            const params = new URLSearchParams(window.location.search);
            const appId = params.get('appid') || params.get('id');

            if (!appId) {
                showError('No game ID provided');
                return;
            }

            try {
                // Fetch game details, player count, and news in parallel
                const [detailsRes, playersRes, newsRes] = await Promise.all([
                    fetch(`https://steam.gdb.gg/steam/api/games/${appId}/details`),
                    fetch(`https://steam.gdb.gg/steam/api/games/${appId}/players`),
                    fetch(`https://steam.gdb.gg/steam/api/games/${appId}/news`)
                ]);

                if (!detailsRes.ok) {
                    throw new Error('Game not found');
                }

                const details = await detailsRes.json();
                const players = playersRes.ok ? await playersRes.json() : null;
                const news = newsRes.ok ? await newsRes.json() : null;

                renderGamePage(details, players, news);
            } catch (error) {
                console.error('Error loading game:', error);
                showError(error.message || 'Failed to load game details');
            }
        }

        function renderGamePage(game, playerData, newsData) {
            // Update page title
            document.title = `${game.name} - gdb.gg Steam Tracker`;

            // Parse HTML description to plain text
            const shortDesc = stripHTML(game.short_description || game.about_the_game || 'No description available');
            
            // Get news items
            const newsItems = newsData?.data?.appnews?.newsitems || newsData?.data?.newsitems || [];
            
            // Get DLC
            const dlcList = game.dlc || [];
            
            // Get price info
            const priceData = game.price_overview;
            
            // Get system requirements
            const pcReqs = game.pc_requirements;
            const macReqs = game.mac_requirements;
            const linuxReqs = game.linux_requirements;

            const html = `
                <div class="game-header">
                    <div class="header-image">
                        <img src="${game.header_image}" alt="${game.name}">
                    </div>
                    <div class="header-info">
                        <h1>${game.name}</h1>
                        <div class="game-meta">
                            ${game.is_free ? '<span class="meta-badge free">Free to Play</span>' : ''}
                            <span class="meta-badge">${game.type || 'game'}</span>
                            ${game.developers ? `<span class="meta-badge">${game.developers[0]}</span>` : ''}
                            ${game.metacritic ? `<span class="meta-badge" style="background:rgba(102,204,102,0.2);border-color:rgba(102,204,102,0.4);color:#6c6;">Metacritic: ${game.metacritic.score}</span>` : ''}
                        </div>
                        <p class="game-description">${shortDesc}</p>
                        <div class="game-stats">
                            ${playerData?.data ? `
                                <div class="stat-item">
                                    <div class="stat-label">Current Players</div>
                                    <div class="stat-value">${formatNumber(playerData.data.player_count || 0)}</div>
                                </div>
                            ` : ''}
                            ${game.recommendations ? `
                                <div class="stat-item">
                                    <div class="stat-label">Reviews</div>
                                    <div class="stat-value">${formatNumber(game.recommendations.total)}</div>
                                </div>
                            ` : ''}
                            ${game.achievements?.total ? `
                                <div class="stat-item">
                                    <div class="stat-label">Achievements</div>
                                    <div class="stat-value">${game.achievements.total}</div>
                                </div>
                            ` : ''}
                            ${game.release_date ? `
                                <div class="stat-item">
                                    <div class="stat-label">Release Date</div>
                                    <div class="stat-value" style="font-size: 1rem;">${game.release_date.date}</div>
                                </div>
                            ` : ''}
                        </div>
                        ${renderPriceBox(priceData, game.is_free)}
                    </div>
                </div>

                <div class="content-columns">
                    <div class="main-column">
                        <!-- Player History Chart -->
                        <div class="player-chart-section">
                            <div class="player-chart-header">
                                <h2>📈 Player History</h2>
                                <div class="chart-controls">
                                    <button class="chart-range-btn active" data-range="24h" onclick="loadPlayerHistory('${game.steam_appid}', '24h', this)">24 Hours</button>
                                    <button class="chart-range-btn" data-range="7d" onclick="loadPlayerHistory('${game.steam_appid}', '7d', this)">7 Days</button>
                                    <button class="chart-range-btn" data-range="30d" onclick="loadPlayerHistory('${game.steam_appid}', '30d', this)">30 Days</button>
                                </div>
                            </div>
                            <div class="player-chart-container" id="playerChartContainer">
                                <canvas id="playerHistoryChart"></canvas>
                                <div class="chart-loading" id="chartLoading">
                                    <div class="loading-spinner"></div>
                                    <p>Loading chart...</p>
                                </div>
                            </div>
                            <div class="chart-info" id="chartInfo" style="display: none;"></div>
                        </div>

                        ${game.screenshots && game.screenshots.length > 0 ? `
                            <div class="section">
                                <h2>📸 Screenshots</h2>
                                <div class="screenshots-grid">
                                    ${game.screenshots.slice(0, 6).map(ss => `
                                        <div class="screenshot">
                                            <img src="${ss.path_thumbnail}" alt="Screenshot" loading="lazy">
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${game.movies && game.movies.length > 0 ? `
                            <div class="section">
                                <h2>🎬 Videos & Trailers</h2>
                                <div class="movies-grid">
                                    ${game.movies.slice(0, 4).map(movie => `
                                        <div class="movie-item" onclick="playVideo('${movie.hls_h264 || movie.dash_h264}', '${escapeQuotes(movie.name)}')">
                                            <img class="movie-thumbnail" src="${movie.thumbnail}" alt="${escapeQuotes(movie.name)}" loading="lazy">
                                            <div class="movie-overlay">
                                                <div class="play-button"></div>
                                            </div>
                                            <div class="movie-title">${movie.name}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${game.about_the_game ? `
                            <div class="section about-section">
                                <h2>📖 About This Game</h2>
                                <div class="about-content collapsed" id="aboutContent">
                                    ${game.about_the_game}
                                </div>
                                <span class="about-toggle" onclick="toggleAbout()">Show More ▼</span>
                            </div>
                        ` : ''}

                        ${newsItems.length > 0 ? `
                            <div class="section">
                                <h2>📰 Latest News</h2>
                                <div class="news-list">
                                    ${newsItems.slice(0, 5).map(item => `
                                        <div class="news-item" onclick="window.open('${item.url}', '_blank')">
                                            <div class="news-title">${item.title}</div>
                                            <div class="news-meta">
                                                ${item.author ? `By ${item.author} • ` : ''}
                                                ${new Date(item.date * 1000).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}
                                            </div>
                                            <div class="news-excerpt">${stripHTML(item.contents).substring(0, 200)}...</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${dlcList.length > 0 ? `
                            <div class="section">
                                <h2>🎮 DLC & Add-ons (${dlcList.length})</h2>
                                <div class="dlc-grid">
                                    ${dlcList.slice(0, 8).map(dlcId => `
                                        <div class="dlc-item" onclick="window.location.href='/steam/game.html?id=${dlcId}'">
                                            <img class="dlc-icon" src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${dlcId}/capsule_184x69.jpg" 
                                                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22120%22 height=%2245%22%3E%3Crect fill=%22%231b2838%22 width=%22100%25%22 height=%22100%25%22/%3E%3C/svg%3E'">
                                            <span class="dlc-name">DLC #${dlcId}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    <div class="side-column">
                        <div class="section">
                            <h2>ℹ️ Game Info</h2>
                            <div class="info-list">
                                ${game.required_age && parseInt(game.required_age) > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Age Rating</div>
                                        <div class="info-value">
                                            <span class="age-rating ${parseInt(game.required_age) >= 18 ? 'mature' : parseInt(game.required_age) >= 13 ? 'teen' : 'everyone'}">
                                                🔞 ${game.required_age}+
                                            </span>
                                        </div>
                                    </div>
                                ` : ''}
                                ${game.developers && game.developers.length > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Developer</div>
                                        <div class="info-value">${game.developers.join(', ')}</div>
                                    </div>
                                ` : ''}
                                ${game.publishers && game.publishers.length > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Publisher</div>
                                        <div class="info-value">${game.publishers.join(', ')}</div>
                                    </div>
                                ` : ''}
                                ${game.platforms ? `
                                    <div class="info-item">
                                        <div class="info-label">Platforms</div>
                                        <div class="info-value">
                                            ${[
                                                game.platforms.windows ? '🪟 Windows' : null,
                                                game.platforms.mac ? '🍎 macOS' : null,
                                                game.platforms.linux ? '🐧 Linux' : null
                                            ].filter(Boolean).join(', ')}
                                        </div>
                                    </div>
                                ` : ''}
                                ${game.website ? `
                                    <div class="info-item">
                                        <div class="info-label">Website</div>
                                        <div class="info-value"><a href="${game.website}" target="_blank" style="color: var(--steam-blue);">Visit Site →</a></div>
                                    </div>
                                ` : ''}
                                ${game.genres && game.genres.length > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Genres</div>
                                        <div class="info-value">
                                            <div class="tag-list">
                                                ${game.genres.map(g => `<span class="tag">${g.description}</span>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                ` : ''}
                                ${game.categories && game.categories.length > 0 ? `
                                    <div class="info-item">
                                        <div class="info-label">Features</div>
                                        <div class="info-value">
                                            <div class="tag-list">
                                                ${game.categories.slice(0, 6).map(c => `<span class="tag">${c.description}</span>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        ${pcReqs?.minimum ? `
                            <div class="section">
                                <h2>💻 System Requirements</h2>
                                <div class="requirements-content">
                                    ${pcReqs.minimum}
                                </div>
                            </div>
                        ` : ''}

                        <div class="section">
                            <h2>🔗 External Links</h2>
                            <div class="info-list">
                                <div class="info-item">
                                    <a href="https://store.steampowered.com/app/${game.steam_appid}" target="_blank" style="color: var(--steam-blue);">View on Steam Store →</a>
                                </div>
                                ${game.metacritic?.url ? `
                                    <div class="info-item">
                                        <a href="${game.metacritic.url}" target="_blank" style="color: var(--steam-blue);">View on Metacritic →</a>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Related Games Section -->
                <div class="section" id="relatedGamesSection" style="display: none;">
                    <h2>🎮 More Games Like This</h2>
                    <div id="relatedGamesContainer">
                        <div class="related-loading">
                            <div class="loading-spinner"></div>
                            <p>Finding similar games...</p>
                        </div>
                    </div>
                </div>

                <!-- Achievements Section -->
                ${game.achievements?.total > 0 ? `
                <div class="section achievements-section" id="achievementsSection">
                    <div class="achievements-header">
                        <h2>🏆 Achievements</h2>
                        <div class="achievements-stats">
                            <div class="achievement-stat">
                                <div class="achievement-stat-value">${game.achievements.total}</div>
                                <div class="achievement-stat-label">Total</div>
                            </div>
                        </div>
                    </div>
                    <div id="achievementsContainer">
                        <div class="related-loading">
                            <div class="loading-spinner"></div>
                            <p>Loading achievements...</p>
                        </div>
                    </div>
                </div>
                ` : ''}
            `;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('content').innerHTML = html;

            // Load player history chart
            loadPlayerHistory(game.steam_appid, '24h', null);

            // Load related games
            loadRelatedGames(game);

            // Load achievements if game has them
            if (game.achievements?.total > 0) {
                loadAchievements(game.steam_appid);
            }
        }

        function renderPriceBox(priceData, isFree) {
            if (isFree) {
                return `<div class="price-box"><span class="price-final free">Free to Play</span></div>`;
            }
            if (!priceData) return '';
            
            const hasDiscount = priceData.discount_percent > 0;
            
            // Format prices consistently using user's locale
            const formatPrice = (cents, currency) => {
                try {
                    // Get user's locale for number formatting
                    const userLocale = navigator.language || 'en-US';
                    return new Intl.NumberFormat(userLocale, {
                        style: 'currency',
                        currency: currency || 'USD',
                        minimumFractionDigits: 2
                    }).format(cents / 100);
                } catch (e) {
                    // Fallback if currency code is invalid
                    return priceData.final_formatted || `${(cents / 100).toFixed(2)}`;
                }
            };
            
            const currency = priceData.currency || 'USD';
            const finalPrice = formatPrice(priceData.final, currency);
            const initialPrice = hasDiscount ? formatPrice(priceData.initial, currency) : '';
            
            return `
                <div class="price-box">
                    ${hasDiscount ? `<span class="price-discount">-${priceData.discount_percent}%</span>` : ''}
                    ${hasDiscount ? `<span class="price-original">${initialPrice}</span>` : ''}
                    <span class="price-final">${finalPrice}</span>
                </div>
            `;
        }

        function showError(message) {
            const html = `
                <div class="error-message">
                    <h2>⚠ Error Loading Game</h2>
                    <p>${message}</p>
                    <p style="margin-top: 1rem;"><a href="/steam/index.html" style="color: var(--steam-blue);">← Back to Steam Tracker</a></p>
                </div>
            `;

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            document.getElementById('content').innerHTML = html;
        }

        function formatNumber(num) {
            return new Intl.NumberFormat().format(num);
        }

        function stripHTML(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function dismissWarning() {
            const banner = document.getElementById('warningBanner');
            banner.classList.add('hidden');
            localStorage.setItem('steamGameWarningDismissed', 'true');
        }

        // Check if warning was previously dismissed
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('steamGameWarningDismissed') === 'true') {
                document.getElementById('warningBanner').classList.add('hidden');
            }
        });

        // Player History Chart
        let playerHistoryChart = null;

        async function loadPlayerHistory(appId, range, buttonEl) {
            const chartLoading = document.getElementById('chartLoading');
            const chartInfo = document.getElementById('chartInfo');
            
            // Update active button
            if (buttonEl) {
                document.querySelectorAll('.chart-range-btn').forEach(btn => btn.classList.remove('active'));
                buttonEl.classList.add('active');
            }

            chartLoading.style.display = 'flex';
            chartInfo.style.display = 'none';

            try {
                const response = await fetch(`https://steam.gdb.gg/steam/api/metrics/history?range=${range}&appid=${appId}`);
                const data = await response.json();

                if (data.success && data.data && data.data.points && data.data.points.length > 0) {
                    renderPlayerChart(data.data, range);
                    
                    // Show data source info
                    if (data.data.data_source) {
                        chartInfo.style.display = 'block';
                        chartInfo.textContent = data.data.data_source === 'collected' 
                            ? '📊 Showing real historical data' 
                            : '⏳ Historical data still collecting - showing estimates';
                    }
                } else {
                    // No data available - show message
                    chartInfo.style.display = 'block';
                    chartInfo.textContent = '📊 Historical data not yet available for this game';
                }
            } catch (error) {
                console.error('Failed to load player history:', error);
                chartInfo.style.display = 'block';
                chartInfo.textContent = '⚠️ Could not load player history';
            } finally {
                chartLoading.style.display = 'none';
            }
        }

        function renderPlayerChart(historyData, range) {
            const ctx = document.getElementById('playerHistoryChart').getContext('2d');
            
            if (playerHistoryChart) {
                playerHistoryChart.destroy();
            }

            // Parse timestamps - API uses 't' for 24h, 'timestamp' for 7d/30d
            const labels = historyData.points.map(p => {
                const date = new Date(p.t || p.timestamp);
                if (range === '24h') {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } else if (range === '7d') {
                    return date.toLocaleDateString([], { weekday: 'short', day: 'numeric' });
                } else {
                    return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
                }
            });

            // Get player data - API might use 'players' or 'in_game' depending on endpoint
            const playerData = historyData.points.map(p => p.players || p.in_game || 0);

            playerHistoryChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Players',
                        data: playerData,
                        borderColor: '#66c0f4',
                        backgroundColor: 'rgba(102, 192, 244, 0.15)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(23, 26, 33, 0.95)',
                            titleColor: '#fff',
                            bodyColor: '#c7d5e0',
                            borderColor: '#66c0f4',
                            borderWidth: 1,
                            padding: 10,
                            callbacks: {
                                label: function(context) {
                                    return `Players: ${formatNumber(context.raw)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(102, 192, 244, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8f98a0',
                                maxRotation: 0,
                                maxTicksLimit: 6
                            }
                        },
                        y: {
                            grid: {
                                color: 'rgba(102, 192, 244, 0.1)',
                                drawBorder: false
                            },
                            ticks: {
                                color: '#8f98a0',
                                callback: function(value) {
                                    if (value >= 1000000) return (value / 1000000).toFixed(1) + 'M';
                                    if (value >= 1000) return (value / 1000).toFixed(0) + 'K';
                                    return value;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Helper function to escape quotes in strings for HTML attributes
        function escapeQuotes(str) {
            if (!str) return '';
            return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        // Video Modal Functions
        function playVideo(url, title) {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            const titleEl = document.getElementById('videoTitle');
            
            titleEl.textContent = title;
            video.src = url;
            modal.style.display = 'flex';
            video.play();
            
            // Pause video if click outside
            modal.onclick = function(e) {
                if (e.target === modal) {
                    closeVideo();
                }
            };
            
            // Close on Escape key
            document.onkeydown = function(e) {
                if (e.key === 'Escape') {
                    closeVideo();
                }
            };
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('modalVideo');
            
            video.pause();
            video.src = '';
            modal.style.display = 'none';
        }

        // About Section Toggle
        function toggleAbout() {
            const content = document.getElementById('aboutContent');
            const toggle = document.querySelector('.about-toggle');
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                toggle.textContent = 'Show Less ▲';
            } else {
                content.classList.add('collapsed');
                toggle.textContent = 'Show More ▼';
            }
        }

        // Load and display achievements
        async function loadAchievements(appid) {
            const container = document.getElementById('achievementsContainer');
            
            try {
                const response = await fetch(`https://steam.gdb.gg/steam/api/games/${appid}/achievements`);
                const data = await response.json();

                if (!data.success || !data.data?.achievements?.length) {
                    container.innerHTML = `
                        <div class="achievements-notice">
                            <p>No achievement data available for this game.</p>
                        </div>
                    `;
                    return;
                }

                const achievements = data.data.achievements;
                const total = achievements.length;

                // Calculate rarity distribution
                const ultraRare = achievements.filter(a => parseFloat(a.percent) < 5).length;
                const rare = achievements.filter(a => parseFloat(a.percent) >= 5 && parseFloat(a.percent) < 15).length;
                const uncommon = achievements.filter(a => parseFloat(a.percent) >= 15 && parseFloat(a.percent) < 50).length;
                const common = achievements.filter(a => parseFloat(a.percent) >= 50).length;

                // Sort achievements by rarity (rarest first)
                const sortedAchievements = [...achievements].sort((a, b) => parseFloat(a.percent) - parseFloat(b.percent));

                const getRarityClass = (percent) => {
                    const p = parseFloat(percent);
                    if (p < 5) return 'ultra-rare';
                    if (p < 15) return 'rare';
                    if (p < 50) return 'uncommon';
                    return 'common';
                };

                const getRarityIcon = (percent) => {
                    const p = parseFloat(percent);
                    if (p < 5) return '💎';
                    if (p < 15) return '⭐';
                    if (p < 50) return '🔷';
                    return '🔵';
                };

                // Format achievement name from API name
                const formatName = (apiName) => {
                    // Convert API names like TF_SCOUT_FIRST_BLOOD to "Scout First Blood"
                    return apiName
                        .replace(/^TF_|^CSGO_|^DOTA_|^HL_|^HL2_|^PORTAL_|^L4D_/, '')
                        .split('_')
                        .map(word => word.charAt(0) + word.slice(1).toLowerCase())
                        .join(' ');
                };

                container.innerHTML = `
                    <!-- Rarity Distribution -->
                    <div class="rarity-legend">
                        <div class="rarity-item">
                            <span class="rarity-dot ultra-rare"></span>
                            <span>Ultra Rare (&lt;5%): ${ultraRare}</span>
                        </div>
                        <div class="rarity-item">
                            <span class="rarity-dot rare"></span>
                            <span>Rare (5-15%): ${rare}</span>
                        </div>
                        <div class="rarity-item">
                            <span class="rarity-dot uncommon"></span>
                            <span>Uncommon (15-50%): ${uncommon}</span>
                        </div>
                        <div class="rarity-item">
                            <span class="rarity-dot common"></span>
                            <span>Common (50%+): ${common}</span>
                        </div>
                    </div>

                    <!-- Rarity Bar -->
                    <div class="rarity-distribution">
                        <div class="rarity-bar ultra-rare" title="${ultraRare} Ultra Rare">
                            <div class="fill" style="width: ${(ultraRare / total) * 100}%"></div>
                        </div>
                        <div class="rarity-bar rare" title="${rare} Rare">
                            <div class="fill" style="width: ${(rare / total) * 100}%"></div>
                        </div>
                        <div class="rarity-bar uncommon" title="${uncommon} Uncommon">
                            <div class="fill" style="width: ${(uncommon / total) * 100}%"></div>
                        </div>
                        <div class="rarity-bar common" title="${common} Common">
                            <div class="fill" style="width: ${(common / total) * 100}%"></div>
                        </div>
                    </div>

                    <!-- Achievements Grid -->
                    <div class="achievements-grid">
                        ${sortedAchievements.slice(0, 50).map(ach => `
                            <div class="achievement-item">
                                <div class="achievement-icon">
                                    ${getRarityIcon(ach.percent)}
                                </div>
                                <div class="achievement-info">
                                    <div class="achievement-name">${formatName(ach.name)}</div>
                                    <div class="achievement-desc">Global unlock rate</div>
                                </div>
                                <div class="achievement-percent ${getRarityClass(ach.percent)}">
                                    ${parseFloat(ach.percent).toFixed(1)}%
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    ${achievements.length > 50 ? `
                        <div class="achievements-notice">
                            <p>Showing 50 of ${achievements.length} achievements (sorted by rarity)</p>
                        </div>
                    ` : ''}

                    <div class="achievements-notice">
                        <p>📊 Achievement names and icons require an API enhancement. <a href="/steam/API_REQUESTS.md" target="_blank">View requirements</a></p>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load achievements:', error);
                container.innerHTML = `
                    <div class="achievements-notice">
                        <p>Failed to load achievements. Please try again later.</p>
                    </div>
                `;
            }
        }

        // Related Games - Find games by same developer or genre
        async function loadRelatedGames(currentGame) {
            const section = document.getElementById('relatedGamesSection');
            const container = document.getElementById('relatedGamesContainer');
            
            try {
                // Search for games by the same developer
                const developer = currentGame.developers?.[0];
                const genre = currentGame.genres?.[0]?.description;
                
                if (!developer && !genre) {
                    section.style.display = 'none';
                    return;
                }

                // Use the popular games endpoint and filter client-side
                // This is a workaround since there's no direct search-by-developer API
                const response = await fetch('https://steam.gdb.gg/steam/api/games/popular?limit=50');
                const data = await response.json();

                if (!data.success || !data.data) {
                    section.style.display = 'none';
                    return;
                }

                // Filter to find games that might be related (we'll fetch details for top candidates)
                // For now, just show popular games as "recommended" (excluding current game)
                const otherGames = data.data.filter(g => g.appid !== currentGame.steam_appid).slice(0, 6);

                if (otherGames.length === 0) {
                    section.style.display = 'none';
                    return;
                }

                // Render the related games
                container.innerHTML = `
                    <div class="related-games-grid">
                        ${otherGames.map(game => `
                            <div class="related-game-card" onclick="window.location.href='game.html?appid=${game.appid}'">
                                <img src="https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${game.appid}/header.jpg" 
                                     alt="${escapeQuotes(game.name)}" 
                                     loading="lazy"
                                     onerror="this.src='https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${game.appid}/capsule_231x87.jpg'">
                                <div class="related-game-info">
                                    <div class="related-game-title">${game.name}</div>
                                    <div class="related-game-meta">${formatNumber(game.current_players || 0)} playing</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                section.style.display = 'block';
            } catch (error) {
                console.error('Failed to load related games:', error);
                section.style.display = 'none';
            }
        }

        // Load on page load
        loadGameDetails();
    </script>

    <footer style="text-align: center; padding: 2rem; color: var(--steam-text-dim); font-size: 0.8rem; border-top: 1px solid rgba(102, 192, 244, 0.1); margin-top: 3rem;">
        <p>&copy; 2025 gdb.gg — Built with <span>♥</span> by a non-dev</p>
    </footer>
</body>
