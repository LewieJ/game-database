<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/gdb-mark.svg">
  <link rel="stylesheet" href="/assets/global.css">
  <link rel="stylesheet" href="/fortnite/css/fortnite.css">
  <link rel="stylesheet" href="/fortnite/css/fortnite-nav.css">
  <title>Fortnite Item Shop Today - gdb.gg | Daily Shop Updates</title><!-- Theme Color -->
  <meta name="theme-color" content="#f7c948">
  <meta name="msapplication-TileColor" content="#0d1117"><!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-base: #0d1117;
      --bg-elevated: #161b22;
      --bg-surface: #1c2128;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.8);
      --text-tertiary: rgba(255, 255, 255, 0.5);
      --text-muted: rgba(255, 255, 255, 0.3);
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      
      /* Classic Fortnite Colors */
      --fn-yellow: #f7c948;
      --fn-blue: #00d4ff;

      /* Rarity Colors */
      --rarity-common: #b4b4b4;
      --rarity-uncommon: #60aa3a;
      --rarity-rare: #49acf2;
      --rarity-epic: #b15be2;
      --rarity-legendary: #ea8d23;
      --rarity-mythic: #ffd700;
      
      /* Series Colors */
      --series-marvel: #ed1d24;
      --series-dc: #0476f2;
      --series-icon: #00ffff;
      --series-gaming: #7b68ee;
      --series-starwars: #ffe81f;
      --series-lego: #ffcc00;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Main Layout */
    .main-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
    }

    /* Page Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-family: 'Bungee', cursive;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .page-title .vbucks-icon {
      width: 28px;
      height: 28px;
    }

    .shop-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .shop-countdown {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    .countdown-label {
      color: var(--text-tertiary);
    }

    .countdown-time {
      font-family: 'Bungee', cursive;
      font-size: 0.9rem;
      color: var(--fn-yellow);
    }

    .item-count {
      font-size: 0.85rem;
      color: var(--text-tertiary);
    }

    .item-count strong {
      color: var(--fn-blue);
      font-weight: 600;
    }

    /* Controls Bar */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    /* Search Box */
    .search-box {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 300px;
    }

    .search-input {
      width: 100%;
      padding: 0.6rem 1rem 0.6rem 2.5rem;
      font-size: 0.85rem;
      font-family: inherit;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s;
    }

    .search-input:focus {
      border-color: var(--fn-yellow);
      background: var(--bg-elevated);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .view-btn {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      background: transparent;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-btn:hover {
      color: var(--text-secondary);
      background: var(--bg-card-hover);
    }

    .view-btn.active {
      background: rgba(247, 201, 72, 0.15);
      color: var(--fn-yellow);
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .filter-tab {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-family: inherit;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .filter-tab:hover {
      border-color: var(--border-hover);
      color: var(--text-secondary);
      background: var(--bg-card);
    }

    .filter-tab.active {
      border-color: var(--fn-yellow);
      color: var(--fn-yellow);
      background: rgba(247, 201, 72, 0.1);
    }

    .filter-count {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    /* Shop Sections */
    .shop-section {
      margin-bottom: 2.5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-family: 'Bungee', cursive;
      font-size: 1rem;
      font-weight: 400;
      color: var(--text-primary);
      text-transform: uppercase;
    }

    .section-count {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    /* Items Grid - Responsive with tile sizes */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    /* Item Card */
    .item-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .item-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    /* Tile Sizes */
    .item-card.size-2x1 {
      grid-column: span 2;
    }

    .item-card.size-3x1 {
      grid-column: span 3;
    }

    /* Rarity Backgrounds */
    .item-image-wrapper {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
    }

    .size-2x1 .item-image-wrapper,
    .size-3x1 .item-image-wrapper {
      aspect-ratio: 2 / 1;
    }

    .size-2x1 .item-image,
    .size-3x1 .item-image {
      object-position: top center;
    }

    .item-card.common .item-image-wrapper { background: linear-gradient(135deg, #636363 0%, #3d3d3d 100%); }
    .item-card.uncommon .item-image-wrapper { background: linear-gradient(135deg, #60aa3a 0%, #2e5a1c 100%); }
    .item-card.rare .item-image-wrapper { background: linear-gradient(135deg, #49acf2 0%, #1a5b8a 100%); }
    .item-card.epic .item-image-wrapper { background: linear-gradient(135deg, #b15be2 0%, #5b2e73 100%); }
    .item-card.legendary .item-image-wrapper { background: linear-gradient(135deg, #ea8d23 0%, #8a4d0e 100%); }
    .item-card.mythic .item-image-wrapper { background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); }

    /* Series Borders */
    .item-card.series-marvel { border-color: var(--series-marvel); box-shadow: 0 0 15px rgba(237, 29, 36, 0.3); }
    .item-card.series-dc { border-color: var(--series-dc); box-shadow: 0 0 15px rgba(4, 118, 242, 0.3); }
    .item-card.series-icon { border-color: var(--series-icon); box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); }
    .item-card.series-gaming { border-color: var(--series-gaming); box-shadow: 0 0 15px rgba(123, 104, 238, 0.3); }
    .item-card.series-starwars { border-color: var(--series-starwars); box-shadow: 0 0 15px rgba(255, 232, 31, 0.3); }
    .item-card.series-lego { border-color: var(--series-lego); box-shadow: 0 0 15px rgba(255, 204, 0, 0.3); }

    .item-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .item-card:hover .item-image {
      transform: scale(1.05);
    }

    /* Badges */
    .item-badges {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .badge {
      padding: 0.2rem 0.5rem;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    .badge-new {
      background: var(--fn-yellow);
      color: #000;
    }

    .badge-bundle {
      background: var(--fn-blue);
      color: #000;
    }

    .badge-sale {
      background: #ef4444;
      color: #fff;
    }

    .badge-series {
      font-size: 0.6rem;
      padding: 0.15rem 0.4rem;
    }

    .badge-series.marvel { background: var(--series-marvel); color: #fff; }
    .badge-series.dc { background: var(--series-dc); color: #fff; }
    .badge-series.icon { background: var(--series-icon); color: #000; }
    .badge-series.gaming { background: var(--series-gaming); color: #fff; }
    .badge-series.starwars { background: var(--series-starwars); color: #000; }
    .badge-series.lego { background: var(--series-lego); color: #000; }

    /* Item Info */
    .item-info {
      padding: 0.75rem;
    }

    .item-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.25rem;
    }

    .item-type {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-bottom: 0.5rem;
    }

    .item-price {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .price-current {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .price-current .vbucks-icon {
      width: 16px;
      height: 16px;
    }

    .price-original {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: line-through;
    }

    /* V-Bucks Icon SVG */
    .vbucks-icon {
      display: inline-block;
      vertical-align: middle;
    }

    /* Loading State */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--fn-yellow);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .error-state h3 {
      font-family: 'Bungee', cursive;
      font-size: 1.2rem;
      color: #ef4444;
      margin-bottom: 0.5rem;
    }

    .error-state p {
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }

    /* No Results */
    .no-results {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-tertiary);
    }

    .no-results h3 {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
    }

    /* Bundle Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 600px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title {
      font-family: 'Bungee', cursive;
      font-size: 1.1rem;
      color: var(--text-primary);
    }

    .modal-close {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-tertiary);
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .modal-body {
      padding: 1.5rem;
    }

    .modal-item-preview {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-item-image {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--bg-surface);
    }

    .modal-item-details h3 {
      font-family: 'Bungee', cursive;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .modal-item-details p {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-bottom: 0.75rem;
    }

    .modal-price {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .bundle-contents-title {
      font-family: 'Bungee', cursive;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
    }

    .bundle-items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.75rem;
    }

    .bundle-item {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
    }

    .bundle-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 0.25rem;
    }

    .bundle-item-name {
      font-size: 0.7rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
      }

      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box {
        max-width: none;
      }

      .items-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.75rem;
      }

      .item-card.size-2x1,
      .item-card.size-3x1 {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <!-- Master Navigation (injected by global.js) -->
  <div id="global-nav"></div>
  <script src="/assets/global.js"></script>
  
  <!-- Fortnite Sub-Navigation -->
  <div id="fortnite-sub-nav"></div>
  <script src="/fortnite/js/fortnite-nav.js"></script>

  <main class="main-content">
    <!-- Page Header -->
    <div class="page-header">
      <h1 class="page-title">
        <svg class="vbucks-icon" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" fill="#00d4ff"/>
          <text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">V</text>
        </svg>
        Item Shop
      </h1>
      <div class="shop-meta">
        <div class="shop-countdown">
          <span class="countdown-label">Resets in</span>
          <span class="countdown-time" id="shopCountdown">--:--:--</span>
        </div>
        <div class="item-count">
          <strong id="totalItems">0</strong> items available
        </div>
      </div>
    </div>

    <!-- Controls Bar -->
    <div class="controls-bar">
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search items...">
      </div>
      <div class="view-toggle">
        <button class="view-btn active" data-view="sections">By Section</button>
        <button class="view-btn" data-view="category">By Category</button>
      </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">All Items</button>
    </div>

    <!-- Shop Content -->
    <div id="shopContent">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading today's shop...</div>
      </div>
    </div>
  </main>

  <footer class="home-footer" role="contentinfo">
    <div class="home-footer-inner">
      <a href="/" class="home-footer-brand" aria-label="Game Database home">
        <span class="home-footer-logo">GDB</span><span class="home-footer-dot">.</span><span class="home-footer-gg">GG</span>
      </a>
      <div class="home-footer-links">
        <a href="/marathon/">Marathon</a>
        <a href="/fortnite/">Fortnite</a>
        <a href="/#games">Games</a>
        <a href="/pages/about/">About</a>
        <a href="/pages/contact/">Contact</a>
        <a href="/pages/privacy-policy/">Privacy Policy</a>
        <a href="/pages/terms-and-conditions/">Terms</a>
      </div>
      <p class="home-footer-game">Fortnite™ is a trademark of Epic Games, Inc. This site is not affiliated with or endorsed by Epic Games.</p>
      <p class="home-footer-copy">&copy; 2026 Game Database · GDB.GG</p>
    </div>
  </footer>

  <!-- Bundle Modal -->
  <div class="modal-overlay" id="bundleModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Bundle Details</h2>
        <button class="modal-close" id="modalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic content -->
      </div>
    </div>
  </div>

  <script>
    // ==================== STATE ====================
    let allShopItems = [];
    let allEntries = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentView = 'sections';

    // V-Bucks icon SVG
    const VBUCKS_ICON = `<svg class="vbucks-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" fill="#00d4ff"/><text x="12" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">V</text></svg>`;

    // ==================== COUNTDOWN ====================
    function updateCountdown() {
      const now = new Date();
      const utcMidnight = new Date(Date.UTC(
        now.getUTCFullYear(),
        now.getUTCMonth(),
        now.getUTCDate() + 1,
        0, 0, 0
      ));
      
      const diff = utcMidnight - now;
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      document.getElementById('shopCountdown').textContent = 
        `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ==================== CONSTANTS ====================
    const API_BASE = 'https://fortnitestore.gdb.gg';

    // ==================== LOAD SHOP ====================
    async function loadShop() {
      try {
        const response = await fetch(`${API_BASE}/shop/enriched`);
        if (!response.ok) throw new Error('Failed to fetch shop');
        
        const responseData = await response.json();
        
        // New API wraps fortnite-api.com response in data property
        const data = responseData.data;
        
        if (data.status !== 200 || !data.data) {
          throw new Error('Invalid shop data');
        }

        processShopData(data.data);
      } catch (error) {
        console.error('Shop error:', error);
        document.getElementById('shopContent').innerHTML = `
          <div class="error-state">
            <h3>Failed to load item shop</h3>
            <p>Please try again later</p>
          </div>
        `;
      }
    }

    function processShopData(data) {
      allShopItems = [];
      allEntries = [];

      data.entries.forEach(entry => {
        const layoutName = entry.layout?.name || 'Other';
        const layoutIndex = entry.layout?.index || 999;
        const tileSize = entry.tileSize || 'Size_1_x_1';

        let itemInfo = null;
        let imageUrl = null;
        let itemType = 'Item';
        let isJamTrack = false;
        let bundleItems = [];

        // Check for BR items
        if (entry.brItems && entry.brItems.length > 0) {
          const brItem = entry.brItems[0];
          itemInfo = {
            name: brItem.name,
            type: brItem.type?.displayValue || brItem.type?.value || 'Item',
            rarity: brItem.rarity,
            series: brItem.series,
            set: brItem.set?.value,
            description: brItem.description
          };
          imageUrl = entry.newDisplayAsset?.renderImages?.[0]?.image || 
                     brItem.images?.featured || 
                     brItem.images?.icon ||
                     brItem.images?.smallIcon;
          itemType = brItem.type?.displayValue || brItem.type?.value || 'Item';

          // Collect bundle items
          if (entry.brItems.length > 1) {
            bundleItems = entry.brItems.map(item => ({
              name: item.name,
              type: item.type?.displayValue || 'Item',
              image: item.images?.smallIcon || item.images?.icon
            }));
          }
        }
        // Jam Tracks
        else if (entry.tracks && entry.tracks.length > 0) {
          const track = entry.tracks[0];
          itemInfo = {
            name: track.title,
            type: 'Jam Track',
            rarity: { value: 'rare', displayValue: 'Rare' },
            series: null,
            set: track.artist,
            description: `${track.artist} (${track.releaseYear})`
          };
          imageUrl = track.albumArt;
          itemType = 'Jam Track';
          isJamTrack = true;
        }
        // Instruments
        else if (entry.instruments && entry.instruments.length > 0) {
          const instrument = entry.instruments[0];
          itemInfo = {
            name: instrument.name,
            type: 'Instrument',
            rarity: instrument.rarity,
            series: instrument.series,
            set: instrument.set?.value,
            description: instrument.description
          };
          imageUrl = instrument.images?.icon || instrument.images?.smallIcon;
          itemType = 'Instrument';
        }
        // Cars
        else if (entry.cars && entry.cars.length > 0) {
          const car = entry.cars[0];
          itemInfo = {
            name: car.name,
            type: 'Vehicle',
            rarity: car.rarity,
            series: car.series,
            set: car.set?.value,
            description: car.description
          };
          imageUrl = car.images?.icon || car.images?.small;
          itemType = 'Vehicle';
        }
        // LEGO Kits
        else if (entry.legoKits && entry.legoKits.length > 0) {
          const kit = entry.legoKits[0];
          itemInfo = {
            name: kit.name,
            type: 'LEGO Kit',
            rarity: { value: 'rare', displayValue: 'LEGO' },
            series: { value: 'LEGO' },
            set: null,
            description: kit.description
          };
          imageUrl = kit.images?.icon || kit.images?.small;
          itemType = 'LEGO Kit';
        }
        // Fallback
        else {
          const nameMatch = entry.devName?.match(/\d+\s*x\s*(.+?)\s*for/i);
          itemInfo = {
            name: nameMatch ? nameMatch[1].trim() : 'Unknown Item',
            type: 'Item',
            rarity: { value: 'common', displayValue: 'Common' },
            series: null,
            set: null,
            description: null
          };
        }

        if (itemInfo) {
          const isBundle = (entry.brItems?.length > 1) || (entry.bundle != null);
          const isNew = isNewItem(entry.inDate);
          const hasSale = entry.finalPrice < entry.regularPrice;

          const processedItem = {
            ...itemInfo,
            imageUrl,
            price: entry.finalPrice,
            regularPrice: entry.regularPrice,
            isBundle,
            isNew,
            hasSale,
            isJamTrack,
            layoutName,
            layoutIndex,
            tileSize,
            bundleItems,
            bundleName: entry.bundle?.name,
            category: getCategory(itemType, isJamTrack),
            offerId: entry.offerId
          };

          allShopItems.push(processedItem);
          allEntries.push({ entry, processedItem });
        }
      });

      document.getElementById('totalItems').textContent = allShopItems.length.toLocaleString();
      buildFilterTabs();
      renderShop();
    }

    function isNewItem(inDate) {
      if (!inDate) return false;
      const itemDate = new Date(inDate);
      const now = new Date();
      const diffHours = (now - itemDate) / (1000 * 60 * 60);
      return diffHours < 48;
    }

    function getCategory(itemType, isJamTrack) {
      if (isJamTrack) return 'music';
      const type = itemType.toLowerCase();
      if (type.includes('outfit') || type.includes('character')) return 'outfits';
      if (type.includes('pickaxe')) return 'pickaxes';
      if (type.includes('glider')) return 'gliders';
      if (type.includes('back bling') || type.includes('backpack')) return 'backblings';
      if (type.includes('emote') || type.includes('dance')) return 'emotes';
      if (type.includes('wrap')) return 'wraps';
      if (type.includes('music') || type.includes('jam') || type.includes('track')) return 'music';
      if (type.includes('loading')) return 'loading';
      if (type.includes('spray')) return 'sprays';
      if (type.includes('lego')) return 'lego';
      if (type.includes('vehicle') || type.includes('car')) return 'vehicles';
      if (type.includes('instrument')) return 'instruments';
      return 'other';
    }

    function getSeriesClass(series) {
      if (!series) return '';
      const value = series.value?.toLowerCase() || '';
      if (value.includes('marvel')) return 'series-marvel';
      if (value.includes('dc')) return 'series-dc';
      if (value.includes('icon')) return 'series-icon';
      if (value.includes('gaming')) return 'series-gaming';
      if (value.includes('star wars')) return 'series-starwars';
      if (value.includes('lego')) return 'series-lego';
      return '';
    }

    function getSeriesBadge(series) {
      if (!series) return '';
      const value = series.value?.toLowerCase() || '';
      let badgeClass = '';
      let badgeText = '';
      
      if (value.includes('marvel')) { badgeClass = 'marvel'; badgeText = 'MARVEL'; }
      else if (value.includes('dc')) { badgeClass = 'dc'; badgeText = 'DC'; }
      else if (value.includes('icon')) { badgeClass = 'icon'; badgeText = 'ICON'; }
      else if (value.includes('gaming')) { badgeClass = 'gaming'; badgeText = 'GAMING'; }
      else if (value.includes('star wars')) { badgeClass = 'starwars'; badgeText = 'STAR WARS'; }
      else if (value.includes('lego')) { badgeClass = 'lego'; badgeText = 'LEGO'; }
      else return '';

      return `<span class="badge badge-series ${badgeClass}">${badgeText}</span>`;
    }

    function getTileSizeClass(tileSize) {
      if (tileSize === 'Size_2_x_1') return 'size-2x1';
      if (tileSize === 'Size_3_x_1') return 'size-3x1';
      return '';
    }

    // ==================== FILTER TABS ====================
    function buildFilterTabs() {
      const categories = {};
      allShopItems.forEach(item => {
        const cat = item.category;
        categories[cat] = (categories[cat] || 0) + 1;
      });

      const categoryLabels = {
        all: 'All Items',
        outfits: '👤 Outfits',
        pickaxes: '⛏️ Pickaxes',
        gliders: '🪂 Gliders',
        backblings: '🎒 Back Blings',
        emotes: '💃 Emotes',
        wraps: '🎨 Wraps',
        music: '🎵 Music',
        loading: '🖼️ Loading',
        sprays: '✨ Sprays',
        lego: '🧱 LEGO',
        vehicles: '🚗 Vehicles',
        instruments: '🎸 Instruments',
        other: '📦 Other'
      };

      let html = `<button class="filter-tab active" data-filter="all">All<span class="filter-count">${allShopItems.length}</span></button>`;

      const sortedCats = Object.entries(categories)
        .sort((a, b) => b[1] - a[1])
        .filter(([cat]) => cat !== 'other');

      sortedCats.forEach(([cat, count]) => {
        const label = categoryLabels[cat] || cat;
        html += `<button class="filter-tab" data-filter="${cat}">${label}<span class="filter-count">${count}</span></button>`;
      });

      if (categories.other) {
        html += `<button class="filter-tab" data-filter="other">${categoryLabels.other}<span class="filter-count">${categories.other}</span></button>`;
      }

      document.getElementById('filterTabs').innerHTML = html;

      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentFilter = tab.dataset.filter;
          renderShop();
        });
      });
    }

    // ==================== RENDER ====================
    function renderShop() {
      const searchLower = currentSearch.toLowerCase().trim();
      
      const filteredItems = allShopItems.filter(item => {
        if (currentFilter !== 'all' && item.category !== currentFilter) return false;
        
        if (searchLower) {
          const nameMatch = item.name.toLowerCase().includes(searchLower);
          const setMatch = item.set?.toLowerCase().includes(searchLower);
          const typeMatch = item.type.toLowerCase().includes(searchLower);
          const layoutMatch = item.layoutName.toLowerCase().includes(searchLower);
          if (!nameMatch && !setMatch && !typeMatch && !layoutMatch) return false;
        }
        
        return true;
      });

      if (filteredItems.length === 0) {
        document.getElementById('shopContent').innerHTML = `
          <div class="no-results">
            <h3>No items found</h3>
            <p>Try adjusting your search or filters</p>
          </div>
        `;
        return;
      }

      if (currentView === 'sections') {
        renderBySections(filteredItems);
      } else {
        renderByCategory(filteredItems);
      }
    }

    function renderBySections(items) {
      const groups = {};
      items.forEach(item => {
        if (!groups[item.layoutName]) {
          groups[item.layoutName] = {
            name: item.layoutName,
            index: item.layoutIndex,
            items: []
          };
        }
        groups[item.layoutName].items.push(item);
      });

      const sortedGroups = Object.values(groups).sort((a, b) => a.index - b.index);

      let html = '';
      sortedGroups.forEach(group => {
        html += `
          <section class="shop-section">
            <div class="section-header">
              <h2 class="section-title">${escapeHtml(group.name)}</h2>
              <span class="section-count">${group.items.length} items</span>
            </div>
            <div class="items-grid">
              ${group.items.map(item => renderItemCard(item)).join('')}
            </div>
          </section>
        `;
      });

      document.getElementById('shopContent').innerHTML = html;
      attachCardListeners();
    }

    function renderByCategory(items) {
      const categoryLabels = {
        outfits: 'Outfits',
        pickaxes: 'Pickaxes',
        gliders: 'Gliders',
        backblings: 'Back Blings',
        emotes: 'Emotes',
        wraps: 'Wraps',
        music: 'Music & Jam Tracks',
        loading: 'Loading Screens',
        sprays: 'Sprays',
        lego: 'LEGO',
        vehicles: 'Vehicles',
        instruments: 'Instruments',
        other: 'Other'
      };

      const groups = {};
      items.forEach(item => {
        if (!groups[item.category]) {
          groups[item.category] = [];
        }
        groups[item.category].push(item);
      });

      const categoryOrder = ['outfits', 'pickaxes', 'gliders', 'backblings', 'emotes', 'wraps', 'music', 'instruments', 'vehicles', 'lego', 'loading', 'sprays', 'other'];

      let html = '';
      categoryOrder.forEach(cat => {
        if (groups[cat] && groups[cat].length > 0) {
          html += `
            <section class="shop-section">
              <div class="section-header">
                <h2 class="section-title">${categoryLabels[cat] || cat}</h2>
                <span class="section-count">${groups[cat].length} items</span>
              </div>
              <div class="items-grid">
                ${groups[cat].map(item => renderItemCard(item)).join('')}
              </div>
            </section>
          `;
        }
      });

      document.getElementById('shopContent').innerHTML = html;
      attachCardListeners();
    }

    function renderItemCard(item) {
      const rarityClass = (item.rarity?.value || 'common').toLowerCase();
      const seriesClass = getSeriesClass(item.series);
      const sizeClass = getTileSizeClass(item.tileSize);
      const seriesBadge = getSeriesBadge(item.series);

      let badges = '';
      if (item.isNew) badges += '<span class="badge badge-new">New!</span>';
      if (item.isBundle) badges += '<span class="badge badge-bundle">Bundle</span>';
      if (item.hasSale) badges += '<span class="badge badge-sale">Sale</span>';
      if (seriesBadge) badges += seriesBadge;

      const priceHtml = item.hasSale 
        ? `<span class="price-original">${item.regularPrice.toLocaleString()}</span><span class="price-current">${VBUCKS_ICON}${item.price.toLocaleString()}</span>`
        : `<span class="price-current">${VBUCKS_ICON}${item.price.toLocaleString()}</span>`;

      const imageUrl = item.imageUrl || '/assets/icons/placeholder.png';

      return `
        <div class="item-card ${rarityClass} ${seriesClass} ${sizeClass}" data-item-id="${item.offerId}" data-is-bundle="${item.isBundle}">
          <div class="item-image-wrapper">
            <img class="item-image" src="${imageUrl}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.src='/assets/icons/placeholder.png'">
            ${badges ? `<div class="item-badges">${badges}</div>` : ''}
          </div>
          <div class="item-info">
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-type">${escapeHtml(item.type)}</div>
            <div class="item-price">${priceHtml}</div>
          </div>
        </div>
      `;
    }

    function attachCardListeners() {
      document.querySelectorAll('.item-card[data-is-bundle="true"]').forEach(card => {
        card.addEventListener('click', () => {
          const itemId = card.dataset.itemId;
          const itemData = allShopItems.find(i => i.offerId === itemId);
          if (itemData) {
            showBundleModal(itemData);
          }
        });
      });
    }

    // ==================== MODAL ====================
    function showBundleModal(item) {
      document.getElementById('modalTitle').textContent = item.bundleName || item.name;
      
      const imageUrl = item.imageUrl || '/assets/icons/placeholder.png';
      const priceHtml = item.hasSale 
        ? `<span class="price-original">${item.regularPrice.toLocaleString()}</span><span class="price-current">${VBUCKS_ICON}${item.price.toLocaleString()}</span>`
        : `<span class="price-current">${VBUCKS_ICON}${item.price.toLocaleString()}</span>`;

      let bundleItemsHtml = '';
      if (item.bundleItems && item.bundleItems.length > 0) {
        bundleItemsHtml = `
          <div class="bundle-contents-title">Bundle Contents (${item.bundleItems.length} items)</div>
          <div class="bundle-items-grid">
            ${item.bundleItems.map(bi => `
              <div class="bundle-item">
                <img src="${bi.image || '/assets/icons/placeholder.png'}" alt="${escapeHtml(bi.name)}" onerror="this.src='/assets/icons/placeholder.png'">
                <div class="bundle-item-name">${escapeHtml(bi.name)}</div>
              </div>
            `).join('')}
          </div>
        `;
      }

      document.getElementById('modalBody').innerHTML = `
        <div class="modal-item-preview">
          <img class="modal-item-image" src="${imageUrl}" alt="${escapeHtml(item.name)}">
          <div class="modal-item-details">
            <h3>${escapeHtml(item.name)}</h3>
            <p>${escapeHtml(item.type)}${item.set ? ` • ${escapeHtml(item.set)}` : ''}</p>
            <div class="modal-price">${priceHtml}</div>
          </div>
        </div>
        ${bundleItemsHtml}
      `;

      document.getElementById('bundleModal').classList.add('active');
    }

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('bundleModal').classList.remove('active');
    });

    document.getElementById('bundleModal').addEventListener('click', (e) => {
      if (e.target.id === 'bundleModal') {
        document.getElementById('bundleModal').classList.remove('active');
      }
    });

    // ==================== SEARCH ====================
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearch = e.target.value;
      renderShop();
    });

    // ==================== VIEW TOGGLE ====================
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        renderShop();
      });
    });

    // ==================== HELPERS ====================
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== INIT ====================
    loadShop();
  </script>
</body>
</html>
